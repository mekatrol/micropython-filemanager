<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src __CSP_SOURCE__; script-src 'nonce-__NONCE__';">
  <title>__TITLE__</title>
  <link rel="stylesheet" href="__CSS_URI__">
</head>
<body>
  <div class="wrap">
    <h2>__TITLE__</h2>
    <p class="hint">Review differences, optionally Compare mismatched files, then choose a sync direction.</p>
    <table>
      <thead>
        <tr>
          <th>Path</th>
          <th class="scope">Scope</th>
          <th class="status">Status</th>
          <th class="action">Action</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="buttons">
      <button id="syncToDevice" class="secondary">Sync Computer to Device</button>
      <button id="syncFromDevice" class="secondary">Sync Device to Computer</button>
      <button id="close">Close</button>
    </div>
  </div>
  <script id="initial-state" type="application/json">__INITIAL_STATE__</script>
  <script nonce="__NONCE__" src="__SCRIPT_URI__"></script>
</body>
</html>
